name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend Tests ───────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_pharma_db
          POSTGRES_USER: pharma_user
          POSTGRES_PASSWORD: pharma_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pharma_user -d test_pharma_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      DB_NAME: test_pharma_db
      DB_USER: pharma_user
      DB_PASSWORD: pharma_pass
      DB_HOST: localhost
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: config.settings.local

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --verbosity=0

      - name: Run tests
        working-directory: backend
        run: python manage.py test --verbosity=2

      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

  # ─── Frontend Build & Lint ───────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000/api
        run: npm run build

  # ─── Docker Build Verification ──────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t pharma-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=http://localhost:8000/api \
            -t pharma-frontend:ci \
            ./frontend

      - name: Verify Docker Compose config
        run: docker compose config --quiet
